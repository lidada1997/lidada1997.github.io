# 个人作品集网站配置
title: 李大大的作品集
description: AI工程师 × 全栈开发 × 数据分析
author: lidada1997
email: lidada1997@qq.com
baseurl: "" # 网站子路径，如 /blog
url: "https://lidada1997.github.io" # 网站完整URL

# 社交链接
github_username: lidada1997
# twitter_username: your-twitter
# linkedin_username: your-linkedin

# 主题设置
theme: jekyll-theme-minimal
# 或使用: jekyll-theme-cayman, jekyll-theme-slate

# Markdown设置
markdown: kramdown
highlighter: rouge

# 导航菜单
header_pages:
  - index.md
  - projects.md
  - about.md

# 插件
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# 其他设置
show_downloads: false
google_analytics: # 可选：添加Google Analytics

# 构建设置
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

# 时区
timezone: Asia/Shanghai
